<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Carrusel Infinito Moderno | Tarjetas Interactivas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* Contenedor principal del carrusel */
        .carousel-container {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Wrapper con posicionamiento para los botones laterales */
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 2rem;
            padding: 0.5rem 0;
            cursor: grab;
            user-select: none;
        }

        .carousel-wrapper.dragging {
            cursor: grabbing;
        }

        .carousel-track {
            display: flex;
            gap: 2rem;
            will-change: transform;
            transition: transform 0.08s linear;
        }

        /* Tarjeta moderna - MÁS GRANDE */
        .card {
            flex: 0 0 auto;
            width: 340px;
            background: linear-gradient(145deg, #1e2a3a 0%, #16212e 100%);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 30px 45px -15px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #243544 0%, #1a2a3a 100%);
            border-color: rgba(100, 150, 200, 0.3);
        }

        .card-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
            pointer-events: none;
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 1.5rem 1.2rem 1.8rem;
            text-align: center;
            pointer-events: none;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #e8f0fe;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e8f0fe, #a8c8e8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-sub {
            font-size: 0.95rem;
            color: #8aa9c9;
            font-weight: 400;
            line-height: 1.4;
        }

        /* Botones de navegación LATERALES - MÁS GRANDES */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 45, 60, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: #e8f0fe;
            font-weight: bold;
            z-index: 10;
        }

        .nav-btn:hover {
            background: #2c4a6e;
            color: white;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.3);
        }

        .nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        #prevBtn {
            left: -28px;
        }

        #nextBtn {
            right: -28px;
        }

        /* Modal principal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: transparent;
            max-width: 90vw;
            width: auto;
            border-radius: 0;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        /* Contenedor de la imagen del modal - clickeable para ampliar */
        .modal-img-container {
            position: relative;
            cursor: pointer;
            background-color: transparent;
            overflow: hidden;
            display: inline-block;
        }

        .modal-img {
            max-width: 90vw;
            max-height: 85vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            transition: transform 0.3s ease;
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Efecto de zoom al hacer clic */
        .modal-img.zoomed {
            transform: scale(1.8);
            cursor: zoom-out;
        }

        .modal-img-container:hover .modal-img:not(.zoomed) {
            transform: scale(1.02);
        }

        /* Indicador de que la imagen es clickeable */
        .zoom-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: #e8f0fe;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
            transition: opacity 0.3s;
        }

        /* Título del modal */
        .modal-title-container {
            text-align: center;
            margin-top: 20px;
            padding: 0 20px;
        }

        .modal-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e8f0fe, #7aa9d4);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Botón de cerrar */
        .close-modal-btn {
            position: fixed;
            top: 25px;
            right: 30px;
            background: rgba(30, 45, 60, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: all 0.2s ease;
            color: #e8f0fe;
            z-index: 1001;
            font-weight: bold;
        }

        .close-modal-btn:hover {
            background: #2c4a6e;
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.4);
        }

        /* Instrucción para cerrar */
        .close-hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            color: #8aa9c9;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1001;
        }

        /* Scrollbar para cuando la imagen está ampliada */
        body.modal-zoomed {
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .card {
                width: 280px;
            }
            .card-img {
                height: 220px;
            }
            .card-title {
                font-size: 1.3rem;
            }
            .card-sub {
                font-size: 0.85rem;
            }
            .carousel-container {
                padding: 1.5rem 1rem;
            }
            .nav-btn {
                width: 45px;
                height: 45px;
                font-size: 1.6rem;
            }
            #prevBtn {
                left: -18px;
            }
            #nextBtn {
                right: -18px;
            }
            .modal-title {
                font-size: 1.8rem;
            }
            .zoom-hint {
                font-size: 11px;
                padding: 5px 12px;
                bottom: 15px;
                right: 15px;
            }
            .close-modal-btn {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
                top: 15px;
                right: 15px;
            }
            .modal-img.zoomed {
                transform: scale(1.5);
            }
        }

        @media (max-width: 480px) {
            .card {
                width: 260px;
            }
            .card-img {
                height: 200px;
            }
            .nav-btn {
                width: 38px;
                height: 38px;
                font-size: 1.3rem;
            }
            #prevBtn {
                left: -12px;
            }
            #nextBtn {
                right: -12px;
            }
            .modal-title {
                font-size: 1.4rem;
            }
            .zoom-hint {
                font-size: 10px;
                padding: 4px 10px;
                bottom: 10px;
                right: 10px;
            }
            .modal-img.zoomed {
                transform: scale(1.3);
            }
        }
    </style>
</head>
<body>

<div class="carousel-container">
    <div class="carousel-wrapper" id="carouselWrapper">
        <div class="carousel-track" id="carouselTrack">
            <!-- Las tarjetas se generarán dinámicamente con JS -->
        </div>
    </div>
    
    <!-- Botones de navegación LATERALES -->
    <button class="nav-btn" id="prevBtn">←</button>
    <button class="nav-btn" id="nextBtn">→</button>
</div>

<!-- Modal SIMPLIFICADO - solo imagen y título -->
<div id="modal" class="modal-overlay">
    <button class="close-modal-btn" id="closeModalBtn">✕</button>
    <div class="modal-card">
        <div class="modal-img-container" id="modalImgContainer">
            <img id="modalImg" class="modal-img" src="" alt="detalle">
            <div class="zoom-hint" id="zoomHint">
                🔍 Haz clic para ampliar
            </div>
        </div>
        <div class="modal-title-container">
            <h2 id="modalTitle" class="modal-title"></h2>
        </div>
    </div>
    <div class="close-hint">
        ✕ Haz clic fuera o presiona ESC para cerrar
    </div>
</div>

<script>
    // ---------- DATA: conjunto de tarjetas ----------
    const cardsData = [
        {
            img: "Infografía(1).png",
            title: "SEMANA 1",
            shortDesc: "Identidad institucional y sentido de pertenencia universitaria"
        },
        {
            img: "HISTORIETA(1).png",
            title: "SEMANA 2",
            shortDesc: "Liderazgo académico y trabajo en equipo en el contexto universitario"
        },
        {
            img: "https://picsum.photos/id/26/800/600",
            title: "SEMANA 3",
            shortDesc: "Estrategias efectivas para la mejora de las técnicas de estudio"
        },
        {
            img: "https://picsum.photos/id/42/800/600",
            title: "SEMANA 4",
            shortDesc: "Estrategias efectivas para el fortalecimiento de los hábitos de estudio"
        },
        {
            img: "https://picsum.photos/id/15/800/600",
            title: "SEMANA 5",
            shortDesc: "Evaluación y seguimiento del aprendizaje"
        },
    ];

    const TRACK = document.getElementById('carouselTrack');
    let currentTranslateX = 0;
    let animationFrameId = null;
    let speed = 0.8;
    let isPaused = false;
    let isDragging = false;
    let startX = 0;
    let startTranslate = 0;
    let setWidthTimeout = null;
    let currentImageSrc = '';
    let isZoomed = false;
    
    // Construir track con múltiples copias
    function buildInfiniteTrack() {
        TRACK.innerHTML = '';
        const copies = 6;
        for (let i = 0; i < copies; i++) {
            cardsData.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-index', idx);
                card.innerHTML = `
                    <img class="card-img" src="${item.img}" alt="${item.title}" loading="lazy" onerror="this.src='https://picsum.photos/id/1/500/400'">
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="card-sub">${item.shortDesc}</div>
                    </div>
                `;
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(item.img, item.title);
                });
                TRACK.appendChild(card);
            });
        }
        updateTrackWidth();
    }
    
    function updateTrackWidth() {
        trackWidth = TRACK.scrollWidth;
    }
    
    let trackWidth = 0;
    
    function getOriginalSetWidth() {
        if (!TRACK.children.length) return 0;
        const totalCardsOriginal = cardsData.length;
        let firstCard = TRACK.children[0];
        if (!firstCard) return 0;
        const cardWidth = firstCard.offsetWidth;
        const gap = 32;
        return (cardWidth + gap) * totalCardsOriginal;
    }
    
    function normalizeTranslate() {
        const originalSetWidth = getOriginalSetWidth();
        if (originalSetWidth === 0) return;
        while (currentTranslateX <= -originalSetWidth) {
            currentTranslateX += originalSetWidth;
        }
        while (currentTranslateX > 0) {
            currentTranslateX -= originalSetWidth;
        }
        TRACK.style.transform = `translateX(${currentTranslateX}px)`;
    }
    
    function startAutoScroll() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        
        function step() {
            if (!isPaused && !isDragging) {
                currentTranslateX -= speed;
                normalizeTranslate();
            }
            animationFrameId = requestAnimationFrame(step);
        }
        step();
    }
    
    // --- Drag to scroll ---
    const carouselWrapperDiv = document.querySelector('.carousel-wrapper');
    
    carouselWrapperDiv.addEventListener('mousedown', (e) => {
        if (e.target.closest('.card')) return;
        isDragging = true;
        startX = e.clientX;
        startTranslate = currentTranslateX;
        carouselWrapperDiv.classList.add('dragging');
        carouselWrapperDiv.style.cursor = 'grabbing';
    });
    
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - startX;
        currentTranslateX = startTranslate + deltaX;
        normalizeTranslate();
    });
    
    window.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            carouselWrapperDiv.classList.remove('dragging');
            carouselWrapperDiv.style.cursor = 'grab';
        }
    });
    
    // Prevenir que el drag afecte a los clicks en tarjetas
    let dragOccurred = false;
    carouselWrapperDiv.addEventListener('mousedown', (e) => {
        if (e.target.closest('.card')) {
            dragOccurred = false;
            const startDragCheck = e.clientX;
            const onMouseMove = (moveEvent) => {
                if (Math.abs(moveEvent.clientX - startDragCheck) > 5) {
                    dragOccurred = true;
                }
                window.removeEventListener('mousemove', onMouseMove);
            };
            window.addEventListener('mousemove', onMouseMove);
            setTimeout(() => window.removeEventListener('mousemove', onMouseMove), 100);
        }
    });
    
    // --- Botones de navegación ---
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    function moveStep(direction) {
        const step = getOriginalSetWidth() / cardsData.length;
        if (direction === 'next') {
            currentTranslateX -= step;
        } else {
            currentTranslateX += step;
        }
        normalizeTranslate();
        isPaused = true;
        setTimeout(() => {
            if (!carouselWrapperDiv.matches(':hover')) {
                isPaused = false;
            }
        }, 300);
    }
    
    prevBtn.addEventListener('click', () => moveStep('prev'));
    nextBtn.addEventListener('click', () => moveStep('next'));
    
    // --- Hover pausa ---
    carouselWrapperDiv.addEventListener('mouseenter', () => {
        isPaused = true;
    });
    carouselWrapperDiv.addEventListener('mouseleave', () => {
        if (!isDragging) {
            isPaused = false;
        }
    });
    
    // --- Modal CON ZOOM EN LA MISMA PÁGINA ---
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modalImg');
    const modalImgContainer = document.getElementById('modalImgContainer');
    const modalTitle = document.getElementById('modalTitle');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const zoomHint = document.getElementById('zoomHint');
    
    // Función para hacer zoom/deszoom
    function toggleZoom() {
        if (isZoomed) {
            modalImg.classList.remove('zoomed');
            zoomHint.innerHTML = '🔍 Haz clic para ampliar';
            isZoomed = false;
            // Permitir scroll si es necesario
            document.body.style.overflow = '';
        } else {
            modalImg.classList.add('zoomed');
            zoomHint.innerHTML = '🔍 Haz clic para reducir';
            isZoomed = true;
            // Evitar scroll cuando está ampliado
            document.body.style.overflow = 'hidden';
        }
    }
    
    // Resetear zoom al cerrar modal
    function resetZoom() {
        if (isZoomed) {
            modalImg.classList.remove('zoomed');
            isZoomed = false;
            zoomHint.innerHTML = '🔍 Haz clic para ampliar';
        }
        document.body.style.overflow = '';
    }
    
    function openModal(imgSrc, title) {
        currentImageSrc = imgSrc;
        modalImg.src = imgSrc;
        modalImg.alt = title;
        modalTitle.innerText = title;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        const wasPaused = isPaused;
        if (!wasPaused) {
            isPaused = true;
            modal.setAttribute('data-wasPaused', 'false');
        } else {
            modal.setAttribute('data-wasPaused', 'true');
        }
        // Resetear zoom al abrir
        resetZoom();
    }
    
    function closeModalHandler() {
        modal.classList.remove('active');
        resetZoom();
        const wasPausedAttr = modal.getAttribute('data-wasPaused');
        if (wasPausedAttr === 'false') {
            if (!carouselWrapperDiv.matches(':hover') && !isDragging) {
                isPaused = false;
            }
        }
        document.body.style.overflow = '';
    }
    
    // Click en la imagen para hacer zoom (no redirige)
    modalImgContainer.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleZoom();
    });
    
    // Cerrar con el botón X
    closeModalBtn.addEventListener('click', closeModalHandler);
    
    // Cerrar al hacer clic en el overlay (fondo)
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModalHandler();
    });
    
    // Cerrar con tecla ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
            closeModalHandler();
        }
    });
    
    function recalcAndReset() {
        updateTrackWidth();
        normalizeTranslate();
    }
    
    window.addEventListener('resize', () => {
        if (setWidthTimeout) clearTimeout(setWidthTimeout);
        setWidthTimeout = setTimeout(() => {
            recalcAndReset();
        }, 150);
    });
    
    // Inicializar
    buildInfiniteTrack();
    setTimeout(() => {
        updateTrackWidth();
        currentTranslateX = 0;
        normalizeTranslate();
        startAutoScroll();
    }, 50);
    
    window.addEventListener('load', () => {
        recalcAndReset();
    });
</script>
</body>
</html>
