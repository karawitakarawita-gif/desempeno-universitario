<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Carrusel Infinito Moderno | Tarjetas Interactivas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* Contenedor principal del carrusel */
        .carousel-container {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Wrapper con posicionamiento para los botones laterales */
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 2rem;
            padding: 0.5rem 0;
            cursor: grab;
            user-select: none;
        }

        .carousel-wrapper.dragging {
            cursor: grabbing;
        }

        .carousel-track {
            display: flex;
            gap: 2rem;
            will-change: transform;
            transition: transform 0.08s linear;
        }

        /* Tarjeta moderna - MÁS GRANDE */
        .card {
            flex: 0 0 auto;
            width: 340px;
            background: linear-gradient(145deg, #1e2a3a 0%, #16212e 100%);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 30px 45px -15px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #243544 0%, #1a2a3a 100%);
            border-color: rgba(100, 150, 200, 0.3);
        }

        /* Estilo tanto para imagen como para video en miniatura */
        .card-media {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
            pointer-events: none;
        }
        
        /* Estilo específico para el video en miniatura (ocupa el mismo espacio que la imagen) */
        .card-video {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
            pointer-events: none;
            background-color: #000;
        }

        .card:hover .card-media,
        .card:hover .card-video {
            transform: scale(1.05);
        }

        .card-content {
            padding: 1.5rem 1.2rem 1.8rem;
            text-align: center;
            pointer-events: none;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #e8f0fe;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e8f0fe, #a8c8e8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-sub {
            font-size: 0.95rem;
            color: #8aa9c9;
            font-weight: 400;
            line-height: 1.4;
        }

        /* Botones de navegación LATERALES - MÁS GRANDES */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 45, 60, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: #e8f0fe;
            font-weight: bold;
            z-index: 10;
        }

        .nav-btn:hover {
            background: #2c4a6e;
            color: white;
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.3);
        }

        .nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        #prevBtn {
            left: -28px;
        }

        #nextBtn {
            right: -28px;
        }

        /* --- Modal para VIDEO y para IMAGEN (Adaptado) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-card {
            background: transparent;
            max-width: 90vw;
            width: auto;
            border-radius: 0;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        /* Contenedor del medio (imagen o video) en el modal */
        .modal-media-container {
            position: relative;
            cursor: pointer;
            background-color: #000;
            overflow: hidden;
            display: inline-block;
            border-radius: 1rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .modal-img {
            max-width: 90vw;
            max-height: 85vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            transition: transform 0.3s ease;
            border-radius: 1rem;
        }
        
        /* Estilo para el video en el modal */
        .modal-video {
            max-width: 90vw;
            max-height: 85vh;
            width: auto;
            height: auto;
            display: block;
            border-radius: 1rem;
            outline: none;
            background: #000;
        }

        .modal-media-container:hover .modal-img {
            transform: scale(1.02);
        }
        
        /* Para el video no aplicamos hover scale para no interferir con controles */
        .modal-media-container:hover .modal-video {
            transform: none;
        }

        /* Indicador de que es clickeable (para imagen) */
        .zoom-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: #e8f0fe;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
        }
        
        /* Hint específico para video (sin indicador de clic para abrir nueva pestaña) */
        .video-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: #e8f0fe;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
        }

        /* Título del modal */
        .modal-title-container {
            text-align: center;
            margin-top: 20px;
            padding: 0 20px;
        }

        .modal-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e8f0fe, #7aa9d4);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Botón de cerrar simplificado (X en la esquina) */
        .close-modal-btn {
            position: fixed;
            top: 25px;
            right: 30px;
            background: rgba(30, 45, 60, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: all 0.2s ease;
            color: #e8f0fe;
            z-index: 1001;
            font-weight: bold;
        }

        .close-modal-btn:hover {
            background: #2c4a6e;
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.4);
        }

        /* Instrucción para cerrar */
        .close-hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            color: #8aa9c9;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1001;
        }

        @media (max-width: 768px) {
            .card {
                width: 280px;
            }
            .card-media, .card-video {
                height: 220px;
            }
            .card-title {
                font-size: 1.3rem;
            }
            .card-sub {
                font-size: 0.85rem;
            }
            .carousel-container {
                padding: 1.5rem 1rem;
            }
            .nav-btn {
                width: 45px;
                height: 45px;
                font-size: 1.6rem;
            }
            #prevBtn {
                left: -18px;
            }
            #nextBtn {
                right: -18px;
            }
            .modal-title {
                font-size: 1.8rem;
            }
            .zoom-hint, .video-hint {
                font-size: 11px;
                padding: 5px 12px;
                bottom: 15px;
                right: 15px;
            }
            .close-modal-btn {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
                top: 15px;
                right: 15px;
            }
        }

        @media (max-width: 480px) {
            .card {
                width: 260px;
            }
            .card-media, .card-video {
                height: 200px;
            }
            .nav-btn {
                width: 38px;
                height: 38px;
                font-size: 1.3rem;
            }
            #prevBtn {
                left: -12px;
            }
            #nextBtn {
                right: -12px;
            }
            .modal-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="carousel-container">
    <div class="carousel-wrapper" id="carouselWrapper">
        <div class="carousel-track" id="carouselTrack">
            <!-- Las tarjetas se generarán dinámicamente con JS -->
        </div>
    </div>
    
    <!-- Botones de navegación LATERALES -->
    <button class="nav-btn" id="prevBtn">←</button>
    <button class="nav-btn" id="nextBtn">→</button>
</div>

<!-- Modal ADAPTADO: puede mostrar IMAGEN o VIDEO -->
<div id="modal" class="modal-overlay">
    <button class="close-modal-btn" id="closeModalBtn">✕</button>
    <div class="modal-card">
        <div class="modal-media-container" id="modalMediaContainer">
            <!-- Aquí se insertará dinámicamente <img> o <video> -->
            <div id="modalDynamicMedia"></div>
            <div id="modalHint" class="zoom-hint">🔍 Click para ampliar</div>
        </div>
        <div class="modal-title-container">
            <h2 id="modalTitle" class="modal-title"></h2>
        </div>
    </div>
    <div class="close-hint">
        ✕ Haz clic fuera o presiona ESC para cerrar
    </div>
</div>

<script>
    // ---------- DATA: conjunto de tarjetas. Para SEMANA 3 se usa video local "AUTOREGULACIONEMOCIONAL.mp4" ----------
    const cardsData = [
        {
            img: "Infografía(1).png",
            title: "SEMANA 1",
            shortDesc: "Identidad institucional y sentido de pertenencia universitaria",
            detailed: "INFOGRAFÍA: Contenido detallado sobre identidad institucional y cómo fortalecer el sentido de pertenencia en la comunidad universitaria.",
            type: "image"      // tipo imagen
        },
        {
            img: "HISTORIETA(1).png",
            title: "SEMANA 2",
            shortDesc: "Liderazgo académico y trabajo en equipo en el contexto universitario",
            detailed: "HISTORIETA: Historia ilustrada sobre liderazgo académico y la importancia del trabajo colaborativo en la universidad.",
            type: "image"
        },
        {
            // VIDEO LOCAL: nombre del archivo "AUTOREGULACIONEMOCIONAL.mp4"
            video: "AUTOREGULACIONEMOCIONAL.mp4",
            poster: "",   // puedes añadir una imagen de poster si lo deseas (opcional)
            title: "SEMANA 3",
            shortDesc: "Estrategias efectivas para la mejora de las técnicas de estudio - VIDEO",
            detailed: "VIDEO: Tutorial sobre autorregulación emocional y técnicas de estudio efectivas.",
            type: "video"
        },
        {
            img: "https://picsum.photos/id/42/800/600",
            title: "SEMANA 4",
            shortDesc: "Estrategias efectivas para el fortalecimiento de los hábitos de estudio",
            detailed: "ANIMACIÓN DIGITAL: Contenido animado sobre cómo crear y mantener hábitos de estudio saludables y productivos.",
            type: "image"
        },
        {
            img: "https://picsum.photos/id/15/800/600",
            title: "SEMANA 5",
            shortDesc: "Evaluación y seguimiento del aprendizaje",
            detailed: "Material completo sobre métodos de autoevaluación y seguimiento del progreso académico.",
            type: "image"
        },
    ];

    const TRACK = document.getElementById('carouselTrack');
    let currentTranslateX = 0;
    let animationFrameId = null;
    let speed = 0.8;
    let isPaused = false;
    let isDragging = false;
    let startX = 0;
    let startTranslate = 0;
    let setWidthTimeout = null;
    
    // Variables para manejar el modal y contenido actual (imagen o video)
    let currentMediaType = 'image';   // 'image' o 'video'
    let currentVideoSrc = '';
    let currentImageSrc = '';
    
    // Construir track con múltiples copias (infinite)
    function buildInfiniteTrack() {
        TRACK.innerHTML = '';
        const copies = 6;
        for (let i = 0; i < copies; i++) {
            cardsData.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-index', idx);
                // Según el tipo, mostrar imagen miniatura (img) o un video miniatura (pero usaremos un elemento <video> silenciado, sin controles? 
                // Para mantener uniformidad, mostraremos una imagen de preview si existe, si es video y no hay poster, usamos un elemento video con preload="metadata" para que se vea un frame.
                // Pero para simplicidad y buena apariencia, si es video intentamos usar un elemento <video> con controles desactivados, autoplay muted loop? 
                // En el carrusel queremos una miniatura estática, así que mejor mostrar un <video> con poster si existiera, o mostrar un frame por defecto.
                // Dado que es más limpio, para el video mostraremos un elemento video con un frame inicial (usando preload="metadata") sin controles y detenido.
                let mediaHtml = '';
                if (item.type === 'video') {
                    // Para la tarjeta usamos un elemento video que se vea como miniatura, sin autoplay, sin controles, y con objeto cover para ajustarse.
                    // Así al pasar el mouse se escala igual que las imágenes.
                    mediaHtml = `<video class="card-video" preload="metadata" muted playsinline disablePictureInPicture>
                                    <source src="${item.video}" type="video/mp4">
                                    Tu navegador no soporta el elemento de video.
                                </video>`;
                } else {
                    // Imagen normal
                    mediaHtml = `<img class="card-media" src="${item.img}" alt="${item.title}" loading="lazy" onerror="this.src='https://picsum.photos/id/1/500/400'">`;
                }
                card.innerHTML = `
                    ${mediaHtml}
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="card-sub">${item.shortDesc}</div>
                    </div>
                `;
                // Evento click para abrir modal (ya sea imagen o video)
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (item.type === 'video') {
                        openModalVideo(item.video, item.title);
                    } else {
                        openModalImage(item.img, item.title);
                    }
                });
                TRACK.appendChild(card);
            });
        }
        updateTrackWidth();
    }
    
    function updateTrackWidth() {
        trackWidth = TRACK.scrollWidth;
    }
    
    let trackWidth = 0;
    
    function getOriginalSetWidth() {
        if (!TRACK.children.length) return 0;
        const totalCardsOriginal = cardsData.length;
        let firstCard = TRACK.children[0];
        if (!firstCard) return 0;
        const cardWidth = firstCard.offsetWidth;
        const gap = 32;
        return (cardWidth + gap) * totalCardsOriginal;
    }
    
    function normalizeTranslate() {
        const originalSetWidth = getOriginalSetWidth();
        if (originalSetWidth === 0) return;
        while (currentTranslateX <= -originalSetWidth) {
            currentTranslateX += originalSetWidth;
        }
        while (currentTranslateX > 0) {
            currentTranslateX -= originalSetWidth;
        }
        TRACK.style.transform = `translateX(${currentTranslateX}px)`;
    }
    
    function startAutoScroll() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        
        function step() {
            if (!isPaused && !isDragging) {
                currentTranslateX -= speed;
                normalizeTranslate();
            }
            animationFrameId = requestAnimationFrame(step);
        }
        step();
    }
    
    // --- Drag to scroll ---
    const carouselWrapperDiv = document.querySelector('.carousel-wrapper');
    
    carouselWrapperDiv.addEventListener('mousedown', (e) => {
        if (e.target.closest('.card')) return;
        isDragging = true;
        startX = e.clientX;
        startTranslate = currentTranslateX;
        carouselWrapperDiv.classList.add('dragging');
        carouselWrapperDiv.style.cursor = 'grabbing';
    });
    
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - startX;
        currentTranslateX = startTranslate + deltaX;
        normalizeTranslate();
    });
    
    window.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            carouselWrapperDiv.classList.remove('dragging');
            carouselWrapperDiv.style.cursor = 'grab';
        }
    });
    
    // Prevenir que el drag afecte a los clicks en tarjetas
    let dragOccurred = false;
    carouselWrapperDiv.addEventListener('mousedown', (e) => {
        if (e.target.closest('.card')) {
            dragOccurred = false;
            const startDragCheck = e.clientX;
            const onMouseMove = (moveEvent) => {
                if (Math.abs(moveEvent.clientX - startDragCheck) > 5) {
                    dragOccurred = true;
                }
                window.removeEventListener('mousemove', onMouseMove);
            };
            window.addEventListener('mousemove', onMouseMove);
            setTimeout(() => window.removeEventListener('mousemove', onMouseMove), 100);
        }
    });
    
    // --- Botones de navegación ---
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    function moveStep(direction) {
        const step = getOriginalSetWidth() / cardsData.length;
        if (direction === 'next') {
            currentTranslateX -= step;
        } else {
            currentTranslateX += step;
        }
        normalizeTranslate();
        isPaused = true;
        setTimeout(() => {
            if (!carouselWrapperDiv.matches(':hover')) {
                isPaused = false;
            }
        }, 300);
    }
    
    prevBtn.addEventListener('click', () => moveStep('prev'));
    nextBtn.addEventListener('click', () => moveStep('next'));
    
    // --- Hover pausa ---
    carouselWrapperDiv.addEventListener('mouseenter', () => {
        isPaused = true;
    });
    carouselWrapperDiv.addEventListener('mouseleave', () => {
        if (!isDragging) {
            isPaused = false;
        }
    });
    
    // --- Modal para IMAGEN ---
    const modal = document.getElementById('modal');
    const modalDynamicMedia = document.getElementById('modalDynamicMedia');
    const modalMediaContainer = document.getElementById('modalMediaContainer');
    const modalTitleElem = document.getElementById('modalTitle');
    const modalHint = document.getElementById('modalHint');
    const closeModalBtn = document.getElementById('closeModalBtn');
    
    // Función para abrir modal de imagen
    function openModalImage(imgSrc, title) {
        currentMediaType = 'image';
        currentImageSrc = imgSrc;
        // Limpiar contenido y crear elemento img
        modalDynamicMedia.innerHTML = '';
        const imgElement = document.createElement('img');
        imgElement.src = imgSrc;
        imgElement.alt = title;
        imgElement.className = 'modal-img';
        modalDynamicMedia.appendChild(imgElement);
        modalTitleElem.innerText = title;
        // Ajustar hint y comportamiento del contenedor
        modalHint.textContent = '🔍 Click para ampliar';
        modalHint.style.display = 'flex';
        // Eliminar event listener anterior y añadir nuevo para abrir en nueva pestaña
        modalMediaContainer.onclick = () => {
            if (currentImageSrc) window.open(currentImageSrc, '_blank');
        };
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        const wasPaused = isPaused;
        if (!wasPaused) {
            isPaused = true;
            modal.setAttribute('data-wasPaused', 'false');
        } else {
            modal.setAttribute('data-wasPaused', 'true');
        }
        // Si hay algún video previo en reproducción en el modal, detenerlo ya que se reemplaza
    }
    
    // Función para abrir modal de VIDEO
    function openModalVideo(videoSrc, title) {
        currentMediaType = 'video';
        currentVideoSrc = videoSrc;
        modalDynamicMedia.innerHTML = '';
        const videoElement = document.createElement('video');
        videoElement.src = videoSrc;
        videoElement.className = 'modal-video';
        videoElement.controls = true;
        videoElement.autoplay = false;
        videoElement.loop = false;
        videoElement.muted = false;
        videoElement.style.maxWidth = '90vw';
        videoElement.style.maxHeight = '85vh';
        // Para mejor experiencia, cargar el video
        videoElement.load();
        modalDynamicMedia.appendChild(videoElement);
        modalTitleElem.innerText = title;
        // Cambiar hint: en video no se puede "ampliar" en nueva pestaña, mostramos mensaje diferente
        modalHint.textContent = '🎬 Controles disponibles';
        modalHint.style.display = 'flex';
        // El contenedor ya no abrirá nueva pestaña, removemos el onclick o dejamos que no haga nada extra
        modalMediaContainer.onclick = (e) => {
            // Evitamos que al hacer click en el contenedor se abra nueva ventana, pero si quieren pausar/reproducir usarán los controles nativos.
            // No hacemos nada para no interferir con los controles del video.
            e.stopPropagation();
        };
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        const wasPaused = isPaused;
        if (!wasPaused) {
            isPaused = true;
            modal.setAttribute('data-wasPaused', 'false');
        } else {
            modal.setAttribute('data-wasPaused', 'true');
        }
    }
    
    function closeModalHandler() {
        // Si hay un video activo y se está reproduciendo, lo pausamos para liberar recursos
        if (currentMediaType === 'video') {
            const videoEl = modalDynamicMedia.querySelector('video');
            if (videoEl) {
                videoEl.pause();
                videoEl.currentTime = 0;
            }
        }
        modal.classList.remove('active');
        document.body.style.overflow = '';
        const wasPausedAttr = modal.getAttribute('data-wasPaused');
        if (wasPausedAttr === 'false') {
            if (!carouselWrapperDiv.matches(':hover') && !isDragging) {
                isPaused = false;
            }
        }
        // Limpiar contenido dinámico opcional
        // modalDynamicMedia.innerHTML = '';
        currentMediaType = 'image';
    }
    
    // Cerrar con el botón X
    closeModalBtn.addEventListener('click', closeModalHandler);
    
    // Cerrar al hacer clic en el overlay (fondo)
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModalHandler();
    });
    
    // Cerrar con tecla ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
            closeModalHandler();
        }
    });
    
    function recalcAndReset() {
        updateTrackWidth();
        normalizeTranslate();
    }
    
    window.addEventListener('resize', () => {
        if (setWidthTimeout) clearTimeout(setWidthTimeout);
        setWidthTimeout = setTimeout(() => {
            recalcAndReset();
        }, 150);
    });
    
    // Inicializar
    buildInfiniteTrack();
    setTimeout(() => {
        updateTrackWidth();
        currentTranslateX = 0;
        normalizeTranslate();
        startAutoScroll();
    }, 50);
    
    window.addEventListener('load', () => {
        recalcAndReset();
    });
</script>
</body>
</html>
